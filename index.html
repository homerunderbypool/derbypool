<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>
<script>
  var url = 'https://script.google.com/macros/s/AKfycbzFfDXIikRdyYoojicg_qPx672v2EwOjn4nmb0sctLN4ZbpYWAa9orc8T5qWk5zVAI7rQ/exec?v=' +
    new Date().toISOString().slice(0, 10);

  // Create a link with noreferrer + noopener which causes iOS Safari
  // to navigate without forwarding stored Google credentials
  var a = document.createElement('a');
  a.href = url;
  a.rel = 'noreferrer noopener';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
</script>
</body>
</html>

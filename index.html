<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>
<script>
  // Open in a new context that doesn't pass Google account cookies
  var url = 'https://script.google.com/macros/s/AKfycbzFfDXIikRdyYoojicg_qPx672v2EwOjn4nmb0sctLN4ZbpYWAa9orc8T5qWk5zVAI7rQ/exec?v=' +
    new Date().toISOString().slice(0, 10);

  // Use a form POST which bypasses credential forwarding on iOS Safari
  var form = document.createElement('form');
  form.method = 'GET';
  form.action = url;
  form.target = '_self';
  document.body.appendChild(form);
  form.submit();
</script>
</body>
</html>
